<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Favorites - VERDE</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/verde-logo.svg" sizes="any">
    <link rel="shortcut icon" href="assets/images/verde-logo.svg">
    <link rel="apple-touch-icon" href="assets/images/verde-logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <!-- My Favorites Page Content -->
    <main class="my-ads-page">
        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <div class="header-content">
                    <h1>My Favorites</h1>
                    <p class="header-subtitle">Track your favorite listings and don't miss out</p>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-heart" style="color: var(--danger);"></i>
                    </div>
                    <div class="stat-content">
                        <h3>0</h3>
                        <p>Total Favorites</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-eye" style="color: var(--primary);"></i>
                    </div>
                    <div class="stat-content">
                        <h3>0</h3>
                        <p>Added This Week</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-tag" style="color: var(--warning);"></i>
                    </div>
                    <div class="stat-content">
                        <h3>0</h3>
                        <p>Price Dropped</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-star" style="color: var(--accent);"></i>
                    </div>
                    <div class="stat-content">
                        <h3>0</h3>
                        <p>Featured</p>
                    </div>
                </div>
            </div>

            <!-- Filter and Sort -->
            <div class="ads-controls">
                <div class="filter-tabs">
                    <button class="tab-btn active" data-filter="all">
                        All (0)
                    </button>
                    <button class="tab-btn" data-filter="emlak">
                        Real Estate (0)
                    </button>
                    <button class="tab-btn" data-filter="vasita">
                        Vehicles (0)
                    </button>
                    <button class="tab-btn" data-filter="elektronik">
                        Electronics (0)
                    </button>
                    <button class="tab-btn" data-filter="ev_esyasi">
                        Home Goods (0)
                    </button>
                </div>
                
                <div class="search-sort">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search your favorites..." class="ads-search">
                    </div>
                    <select class="sort-select">
                        <option value="date-desc">Newly Added</option>
                        <option value="date-asc">Oldest Added</option>
                        <option value="price-asc">Price (Low to High)</option>
                        <option value="price-desc">Price (High to Low)</option>
                        <option value="title-asc">Sort A-Z</option>
                    </select>

                </div>
            </div>

            <!-- Favorite Listings Grid -->
            <div class="favorites-grid">
                <!-- Cards will be loaded by JavaScript -->
            </div>
           
    </main>
    
    
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/realtime-notifications.js"></script>
    <script type="module" src="js/favorites-loader.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>
    
</body>
</html>
