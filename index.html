<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=5.0">
    <title>VENDO - Real Estate, Vehicles, Electronics | Malta's Classifieds Platform</title>

    <meta name="keywords" content="classifieds, real estate, vehicles, cars, electronics, for rent, for sale, second hand">

    <meta name="theme-color" content="#10b981">
    
    <!-- Supabase Configuration -->

    <!-- Canonical: Add when going live (when domain is ready) -->

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="VENDO - Real Estate, Vehicles, Electronics">
    <meta property="og:description"
        content="Discover real estate, vehicles, and electronics listings. Easy filtering, favorites, messaging, and more.">
    <meta property="og:image" content="/assets/images/vendo-logo-og.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="VENDO - Classifieds Platform">
    <meta name="twitter:description" content="Real estate, vehicles, and electronics in one place.">
    <meta name="twitter:image" content="/assets/images/verde-logo-og.png">
    <link rel="icon" type="image/svg+xml" href="/assets/images/verde-logo.svg" sizes="any">
    <link rel="shortcut icon" href="/assets/images/verde-logo.svg">
    <link rel="apple-touch-icon" href="/assets/images/verde-logo.svg">
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest/manifest.webmanifest">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/list-view.css">
    <link rel="stylesheet" href="/css/load-more.css">
    <link rel="stylesheet" href="/css/mobile-loading.css">
    <link rel="stylesheet" href="/css/filters.css">
    <link rel="stylesheet" href="/css/breadcrumb.css">
    <link rel="stylesheet" href="/css/mobile-app-shell.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- LCP Optimizasyonu: Kritik fontlar ve stiller için preload -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style">
    <link rel="preload" href="/css/style.css" as="style">
    <link rel="preload" href="/assets/images/verde-logo.svg" as="image">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- ✅ GÜVENLIK: DOMPurify XSS koruması -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@latest/dist/purify.min.js"></script>

    <!-- Structured Data: Add when domain is ready (WebSite JSON-LD) -->
</head>

<body class="home">
    <div class="scroll-progress" aria-hidden="true">
        <div class="scroll-progress__bar"></div>
    </div>
    <div id="header-placeholder"></div>
    
    <!-- Mobile Action Bar (Hidden on Desktop) - Positioned below header for mobile app feel -->
    <div class="mobile-action-bar">
        <button class="action-btn sort-btn" id="mobileSortBtn">
            <i class="fas fa-clock"></i>
            <span>Newest</span>
        </button>
        <div class="action-divider"></div>
        <button class="action-btn filter-btn" id="mobileFilterBtn">
            <i class="fas fa-filter"></i>
            <span>Filter</span>
        </button>
        <div class="action-divider"></div>
        <button class="action-btn view-btn" id="viewModeToggle">
            <i class="fas fa-th-large"></i>
        </button>
    </div>


    <!-- Main Content Wrapper -->
    <div class="page-wrapper">
        <!-- Left Sidebar - Categories -->
        <aside class="sidebar-categories">
            <div class="sidebar-header">
                <button class="sidebar-toggle-btn" aria-label="Toggle categories" title="Toggle categories">
                    <i class="fas fa-chevron-down expand-icon"></i>
                    <span>Categories</span>
                </button>
                <button class="sidebar-close-btn" aria-label="Close sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <nav class="sidebar-nav sidebar-categories-content">
                <div class="categories-loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading categories...
                </div>
                <!-- Kategoriler dinamik olarak JS tarafından yüklenecek -->
            </nav>
            
            <!-- Left Sidebar - Filters -->
            <div class="sidebar-header filters-header">
                <button class="sidebar-toggle-btn" id="toggleFiltersBtn" aria-label="Toggle filters" title="Toggle filters">
                    <i class="fas fa-chevron-down expand-icon"></i>
                    <span>Filters</span>
                </button>
            </div>
            <div id="sidebarFilters" class="sidebar-filters sidebar-filters-content">
                <!-- Sabit ve dinamik filtreler buraya gelecek -->
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Home Page Banner -->
            <div class="homepage-banner-container" id="homepage-banner-section" style="display: none;">
                <div class="homepage-banner-wrapper">
                    <a href="#" id="homepage-banner-link" target="_blank" rel="noopener noreferrer">
                        <img id="homepage-banner-image" src="" alt="Advertisement">
                    </a>
                    <button class="homepage-banner-close" id="homepage-banner-close" title="Close">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            </div>

            <!-- Breadcrumb Navigation (moved below banner) -->
            <nav class="breadcrumb-nav" aria-label="Breadcrumb"></nav>

            <!-- Featured Listings -->
            <section class="featured-listings">
                <div class="section-header">
                    <h2>Featured Listings</h2>
                    <div class="view-controls grid-v-active">
                        <button class="view-button active" data-view="grid" aria-label="Grid View">
                            <i class="fas fa-th-large"></i>
                            <span>Grid</span>
                        </button>
                        <button class="view-button" data-view="table" aria-label="Table View">
                            <i class="fas fa-list"></i>
                            <span>Table</span>
                        </button>
                    </div>
                </div>
                <!-- Table Header (Hidden by default) -->
                <div class="listings-table-header">
                    <div class="table-media">Model</div>
                    <div class="table-title">Listing Title</div>
                    <div class="table-km">KM</div>
                    <div class="table-color">Color</div>
                    <div class="table-year">Year</div>
                    <div class="table-location">Date/City</div>
                    <div class="table-price">Price</div>
                </div>

                <div class="listings-grid"></div>

                <!-- Pagination -->
                <nav class="pagination" aria-label="Pagination"></nav>

                <!-- Load More Button -->
                <div class="load-more-container" style="display: none;">
                    <button class="load-more-btn">
                        <span class="load-more-text">Load More</span>
                        <span class="loading-text" style="display: none;">Loading...</span>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <!-- Quick Post Fab Button -->
    <button class="post-ad-fab" aria-label="Sell Now">
        <i class="fas fa-plus"></i>
        <span>Sell Now</span>
    </button>

    <div id="bottom-nav-placeholder"></div>

    <!-- Mobile Filter Modal -->
    <div id="mobileFilterModal" class="mobile-filter-modal" style="display: none;">
        <div class="mobile-filter-overlay"></div>
        <div class="mobile-filter-content">
            <div class="mobile-filter-header">
                <h3>Filters</h3>
                <button class="mobile-filter-close" id="mobileFilterClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="mobile-filter-body">
                <div id="mobileSidebarFilters" class="mobile-sidebar-filters">
                    <!-- Filters will be loaded here -->
                </div>
            </div>
            <div class="mobile-filter-footer">
                <button class="btn btn-secondary" id="mobileFilterClear">Clear All</button>
                <button class="btn btn-primary" id="mobileFilterApply">Apply Filters</button>
            </div>
        </div>
    </div>



    <!-- JS CONNECTIONS -->
    <!-- type="module" files use Supabase -->
    <script type="module" src="/js/supabase.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/category-router.js"></script>
    <script type="module" src="/js/breadcrumb.js"></script>
    <script type="module" src="/js/realtime-notifications.js"></script>
    <script type="module" src="/js/sidebar-manager.js"></script>
    <script type="module" src="/js/script.js"></script>
    <script type="module" src="/js/listings-loader.js"></script>
    <script src="/js/homepage-sort-controls.js"></script>
    <script type="module" src="/js/search-filter.js"></script>
    <script type="module" src="/js/pagination.js"></script>

    <!-- Other helper files -->
    <script type="module" src="/js/sidebar-filters.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/layout.js"></script>

    <!-- Initialize Search System -->
    <script type="module">
        import { initializeSearchAndFilters } from '/js/search-filter.js';
        document.addEventListener('DOMContentLoaded', initializeSearchAndFilters);
    </script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/js/sw.js').then((reg) => {
                    if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                        console.log('[SW] Registered:', reg);
                    }
                }).catch((err) => {
                    console.warn('[SW] Registration failed:', err);
                });
            });
        }
    </script>

    <!-- Global error manager and toast -->
    <script type="module" src="js/toast.js"></script>

    <!-- Viewport Optimizer - Auto optimization based on screen dimensions -->
    <script src="js/viewport-optimizer.js"></script>

    <!-- Mobile Enhancements - Touch gestures, bottom nav, pull-to-refresh -->
    <script src="js/mobile-enhancements.js"></script>

    <!-- Scroll to Top Button -->
    <script src="js/scroll-to-top.js"></script>

    <!-- Lazy Loading Images -->
    <script src="js/lazy-loading.js"></script>

    <!-- Scroll Progress Bar -->
    <script src="js/scroll-progress.js"></script>

    <!-- Homepage Banner Loader -->
    <script type="module">
        import { supabase } from './js/supabase.js';

        async function loadHomepageBanner() {
            try {
                const { data, error } = await supabase
                    .from('site_settings')
                    .select('*')
                    .eq('setting_key', 'homepage_banner')
                    .single();

                const bannerSection = document.getElementById('homepage-banner-section');
                const bannerImage = document.getElementById('homepage-banner-image');
                const bannerLink = document.getElementById('homepage-banner-link');
                const closeBtn = document.getElementById('homepage-banner-close');

                if (!bannerSection) return;

                if (!error && data && data.setting_value && data.is_active) {
                    const bannerData = typeof data.setting_value === 'string'
                        ? JSON.parse(data.setting_value)
                        : data.setting_value;

                    if (bannerData.image_url) {
                        // Resim yüklenemezse (404 vb) tüm bölümü gizle
                        bannerImage.onerror = () => {
                            bannerSection.style.display = 'none';
                        };

                        // Resim başarıyla yüklendiğinde ve kullanıcı kapatmamışsa göster
                        bannerImage.onload = () => {
                            if (localStorage.getItem('homepageBannerClosed') === 'true') {
                                bannerSection.style.display = 'none';
                            } else {
                                bannerSection.style.display = 'block';
                            }
                        };

                        bannerImage.src = bannerData.image_url;
                        bannerImage.alt = bannerData.alt_text || 'Advertisement';

                        if (bannerData.link_url) {
                            bannerLink.href = bannerData.link_url;
                        } else {
                            bannerLink.style.cursor = 'default';
                            bannerLink.onclick = (e) => e.preventDefault();
                        }

                        const handleClose = (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            bannerSection.style.display = 'none';
                            localStorage.setItem('homepageBannerClosed', 'true');
                        };

                        closeBtn.addEventListener('click', handleClose);
                        closeBtn.addEventListener('touchstart', handleClose, { passive: false });
                    } else {
                        bannerSection.style.display = 'none';
                    }
                } else {
                    // Explicitly hide if inactive or error
                    bannerSection.style.display = 'none';
                }
            } catch (error) {
                console.error('Homepage banner loading error:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', loadHomepageBanner);
    </script>

</body>

</html>
