<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Categories - VENDO</title>
    <meta name="theme-color" content="#10b981">
    
    <!-- Supabase Configuration -->


    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mobile-loading.css">
    <link rel="stylesheet" href="/css/mobile-app-shell.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f8fafc;
        }
        
        .categories-header {
            background: #fff;
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 1rem;
            justify-content: space-between;
        }
        
        .search-btn {
            border: none;
            background: transparent;
            font-size: 1.2rem;
            color: #1e293b;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-search-bar {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: #fff;
            padding: 0.5rem 1rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: none;
            z-index: 99;
            border-bottom: 1px solid #e2e8f0;
            animation: slideDown 0.2s ease-out;
        }

        .category-search-bar.active {
            display: block;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: #f1f5f9;
            border-radius: 10px;
            padding: 0 0.75rem;
            height: 42px;
            border: 1px solid transparent;
        }

        .search-input-wrapper:focus-within {
            background: #fff;
            border-color: #10b981;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.1);
        }

        .search-input {
            border: none;
            background: transparent;
            width: 100%;
            height: 100%;
            padding: 0 0.5rem;
            outline: none;
            color: #1e293b;
            font-size: 0.95rem;
        }
        
        .back-btn {
            border: none;
            background: transparent;
            font-size: 1.2rem;
            color: #1e293b;
            cursor: pointer;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0f172a;
            margin: 0;
        }

        .categories-list {
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0;
            background: #fff;
            margin-top: 0;
        }

        .category-item {
            background: #fff;
            border: none;
            border-bottom: 1px solid #f1f5f9;
            border-radius: 0;
            padding: 0.6rem 0.25rem; /* Further reduced horizontal padding */
            display: flex;
            align-items: center;
            gap: 0.75rem; /* Reduced gap */
            text-decoration: none;
            color: #1e293b;
            transition: all 0.2s ease;
            position: relative;
        }

        .category-item:last-child {
            border-bottom: none;
        }

        .category-item:active {
            background: #f8fafc;
        }

        .cat-icon {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
            box-shadow: none !important; /* Ensure no shadow */
            text-shadow: none !important;
            filter: none !important;
        }

        .cat-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            /* Ensure text truncation if needed */
            min-width: 0;
        }

        .cat-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #0f172a;
            display: block;
            margin-bottom: 0.15rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cat-count {
            font-size: 0.75rem;
            color: #94a3b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 400;
        }

        .cat-arrow {
            color: #cbd5e1;
            font-size: 0.9rem;
        }
        
        .loading-state {
            padding: 2rem;
            text-align: center;
            color: #64748b;
        }

        /* Locked State */
        .category-item.locked {
            opacity: 0.6;
            pointer-events: none;
            filter: grayscale(0.8);
            background: #f1f5f9;
        }
        .category-item.locked .cat-name {
            color: #64748b;
        }
    </style>
</head>
<body>

    <header class="categories-header">
        <a href="/" class="site-logo" style="display: flex; align-items: center; gap: 0.75rem; text-decoration: none;">
            <div class="logo-icon" style="width: 2.25rem; height: 2.25rem; background: #10b981; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.25rem; border-radius: 8px;">V</div>
            <h1 class="logo-text" style="font-size: 1.4rem; color: #0f172a; font-weight: 700; letter-spacing: -0.5px; margin: 0;">VENDO</h1>
        </a>
        <button class="search-btn" aria-label="Search">
            <i class="fas fa-search"></i>
        </button>
        
        <div class="category-search-bar">
            <div class="search-input-wrapper">
                <i class="fas fa-search" style="color: #94a3b8;"></i>
                <input type="text" class="search-input" placeholder="Search categories or products...">
            </div>
        </div>
    </header>

    <main id="categories-container" class="categories-list">
        <div class="loading-state">
            <i class="fas fa-spinner fa-spin fa-2x"></i>
            <p style="margin-top: 1rem;">Loading categories...</p>
        </div>
    </main>

    <!-- JS Connections -->
    <script type="module" src="/js/supabase.js"></script>
    <script type="module">
        import { initializeCategories, getRootCategories, getChildCategories, getCategoryById, categories } from '/js/category-data.js';

        let currentParentId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            const container = document.getElementById('categories-container');
            
            try {
                await initializeCategories();
                renderCategories(null);
            } catch (error) {
                console.error('Error loading categories:', error);
                container.innerHTML = '<div class="loading-state">Error loading categories.</div>';
            }
        });

        window.renderCategories = function(parentId) {
            currentParentId = parentId;
            const container = document.getElementById('categories-container');
            const items = parentId === null ? getRootCategories() : getChildCategories(parentId);
            
            let html = '';

            // Add Back Button if not at root
            if (parentId !== null) {
                const parentCat = getCategoryById(parentId);
                html += `
                    <div class="category-item back-item" onclick="goBack()" style="background: #f8fafc; border-bottom: 2px solid #e2e8f0; cursor: pointer;">
                        <div class="cat-icon" style="width: 32px; height: 32px; font-size: 1rem; color: #64748b;">
                            <i class="fas fa-arrow-left"></i>
                        </div>
                        <div class="cat-info">
                            <span class="cat-name" style="color: #64748b;">${parentCat ? parentCat.name : 'Back'}</span>
                            <span class="cat-count">Return to Main Menu</span>
                        </div>
                    </div>
                `;

            // Add "See All" option for this category
            if (parentCat) {
                html += `
                <a href="/?cat=${parentCat.slug}" class="category-item" style="border-bottom: 2px solid #f1f5f9;">
                    <div class="cat-icon" style="color: #64748b;">
                        <i class="fas fa-th-large"></i>
                    </div>
                    <div class="cat-info">
                        <span class="cat-name">All ${parentCat.name} Listings</span>
                        <span class="cat-count">See All</span>
                    </div>
                    <i class="fas fa-chevron-right cat-arrow"></i>
                </a>
                `;
            }
            }

            if (items.length === 0) {
                html += '<div class="loading-state">No subcategories found.</div>';
            } else {
                html += items.map(cat => {
                    const subCats = getChildCategories(cat.id);
                    const hasChildren = subCats.length > 0;
                    const subCatText = hasChildren 
                        ? subCats.map(sc => sc.name).slice(0, 5).join(', ') + (subCats.length > 5 ? '...' : '')
                        : 'View Listings';

                    const isLocked = cat.is_locked === true;
                    return `
                    <div class="category-item ${isLocked ? 'locked' : ''}" onclick="${isLocked ? '' : `handleCategoryClick('${cat.slug || cat.id}', ${cat.id}, ${hasChildren})`}">
                        <div class="cat-icon" style="color: #64748b;">
                            <i class="fas ${cat.icon || 'fa-folder'}"></i>
                        </div>
                        <div class="cat-info">
                            <span class="cat-name">${cat.name} ${isLocked ? '<i class="fas fa-lock" style="font-size: 0.8rem; margin-left: 0.4rem; opacity: 0.6;"></i>' : ''}</span>
                            <span class="cat-count">${subCatText}</span>
                        </div>
                        ${isLocked ? '' : '<i class="fas fa-chevron-right cat-arrow"></i>'}
                    </div>
                `}).join('');
            }

            container.innerHTML = html;
            window.scrollTo(0, 0);
        };

        window.handleCategoryClick = function(slugOrId, id, hasChildren) {
            if (hasChildren) {
                renderCategories(id);
            } else {
                window.location.href = `/?cat=${slugOrId}`;
            }
        };

        window.goBack = function() {
            if (currentParentId !== null) {
                const currentCat = getCategoryById(currentParentId);
                const newParentId = currentCat ? currentCat.parentId : null;
                renderCategories(newParentId);
            }
        };

        // Search Toggle Logic
        document.querySelector('.search-btn').addEventListener('click', (e) => {
            const searchBar = document.querySelector('.category-search-bar');
            const searchInput = document.querySelector('.search-input');
            const isHidden = getComputedStyle(searchBar).display === 'none';
            
            if (isHidden) {
                searchBar.classList.add('active');
                setTimeout(() => searchInput.focus(), 100);
            } else {
                searchBar.classList.remove('active');
            }
        });

        // Close search when clicking outside
        document.addEventListener('click', (e) => {
            const searchBar = document.querySelector('.category-search-bar');
            const searchBtn = document.querySelector('.search-btn');
            
            if (searchBar.classList.contains('active') && 
                !searchBar.contains(e.target) && 
                !searchBtn.contains(e.target)) {
                searchBar.classList.remove('active');
            }
        });

        // Search Filter Logic
        document.querySelector('.search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.category-item:not(.back-item)'); // Exclude back button
            const container = document.getElementById('categories-container');
            let hasResults = false;
            
            items.forEach(item => {
                const name = item.querySelector('.cat-name').textContent.toLowerCase();
                if (name.includes(term)) {
                    item.style.display = 'flex';
                    hasResults = true;
                } else {
                    item.style.display = 'none';
                }
            });

            // Show/hide no results message
            let noResults = container.querySelector('.no-results');
            if (!hasResults && term.length > 0) {
                if (!noResults) {
                    noResults = document.createElement('div');
                    noResults.className = 'no-results loading-state';
                    noResults.textContent = 'No results found.';
                    container.appendChild(noResults);
                } else {
                    noResults.style.display = 'block';
                }
            } else if (noResults) {
                noResults.style.display = 'none';
            }
        });
    </script>
    
    <!-- Mobile Enhancements (Bottom Nav) -->
    <div id="bottom-nav-placeholder"></div>
    <script src="js/layout.js"></script>
    <script src="js/mobile-enhancements.js"></script>

</body>
</html>
