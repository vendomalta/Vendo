<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Listings - VERDE</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/verde-logo.svg" sizes="any">
    <link rel="shortcut icon" href="assets/images/verde-logo.svg">
    <link rel="apple-touch-icon" href="assets/images/verde-logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/load-more.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <!-- My Listings Page Content -->
    <main class="my-ads-page listings-page">
        <!-- Mobile Header -->
        <div class="mobile-listing-header">
            <button class="back-btn" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Listings</h2>
            <button class="view-toggle-btn">
                <i class="fas fa-th-large"></i>
            </button>
        </div>

        <div class="container">
            <!-- Page Header and Stats -->
            <div class="page-header">
                <div class="header-content">
                    <h1>Listings</h1>
                    <p class="header-subtitle">Manage, edit, and track the performance of your listings</p>
                </div>
            </div>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle" style="color: var(--success);"></i>
                    </div>
                    <div class="stat-content">
                        <h3 id="active-listings-count">0</h3>
                        <p>Active Listings</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-shopping-bag" style="color: #ef4444;"></i>
                    </div>
                    <div class="stat-content">
                        <h3 id="sold-listings-count">0</h3>
                        <p>Sold</p>
                    </div>
                </div>
            </div>

            <!-- Filter and Search Section -->
            <div class="ads-controls">
                <div class="filter-tabs">
                    <button class="tab-btn active" data-filter="all">
                        All (0)
                    </button>
                    <button class="tab-btn" data-filter="active">
                        Active (0)
                    </button>
                    <button class="tab-btn" data-filter="sold">
                        Sold (0)
                    </button>
                </div> <!-- Correctly closing filter-tabs -->
                <div class="view-toggle desktop-only">
                    <button class="view-btn list-btn" id="list-view-btn" title="List View">
                        <i class="fas fa-list"></i>
                    </button>
                    <button class="view-btn grid-btn active" id="grid-view-btn" title="Grid View">
                        <i class="fas fa-th-large"></i>
                    </button>
                </div>
            </div>

            <!-- Listings List -->
            <div class="ads-container">
                <!-- Loaded via JS -->
            </div>

            <!-- Infinite Scroll Sentinel & Loader -->
            <div id="infinite-scroll-trigger" style="height: 10px; margin-top: 1rem;"></div>
            
            <div id="infinite-loader" style="display: none; text-align: center; padding: 2rem; width: 100%;">
                <div class="spinner-container" style="display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                    <p style="color: var(--text-muted); font-size: 0.9rem;">Loading more listings...</p>
                </div>
            </div>
        </div>
    </main>
    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/realtime-notifications.js"></script>
    <script type="module" src="js/my-listings-loader.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>
    <script type="module">
        import { supabase } from './js/supabase.js';
        document.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            const { data: { user }, error: authError } = await supabase.auth.getUser();
            if (authError || !user) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }

            // Sync sidebar info (if sidebar is added in future or present in layout)
            try {
                const name = user.user_metadata?.full_name || user.email?.split('@')[0];
                const sidebarName = document.getElementById('sidebarProfileName');
                if (sidebarName) sidebarName.textContent = name;
                
                const { data: profile } = await supabase.from('profiles').select('avatar_url').eq('id', user.id).single();
                if (profile?.avatar_url) {
                    const sidebarImg = document.getElementById('sidebarProfileImage');
                    if (sidebarImg) sidebarImg.src = profile.avatar_url;
                }
            } catch (e) {
                console.warn('Sidebar sync error:', e);
            }
        });
    </script>
</body>
</html>
