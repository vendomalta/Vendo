    <title>Reset Password - VERDE</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .reset-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.05));
            padding: 2rem;
        }

        .reset-card {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
        }

        .reset-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .reset-header i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .reset-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .reset-header p {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .password-input-wrapper {
            position: relative;
        }

        .password-input-wrapper input {
            width: 100%;
            padding: 0.75rem;
            padding-right: 3rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .password-strength {
            margin-top: 0.75rem;
        }

        .strength-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s ease;
            width: 0%;
        }

        .strength-fill.weak { background: #ef4444; width: 20%; }
        .strength-fill.fair { background: #f59e0b; width: 50%; }
        .strength-fill.good { background: #10b981; width: 100%; }

        .password-requirements {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .password-requirements li {
            padding: 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .password-requirements li i {
            color: #d1d5db;
        }

        .password-requirements li.valid i {
            color: #10b981;
        }

        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-to-login {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-to-login a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-card">
            <div class="reset-header">
                <i class="fas fa-lock"></i>
                <h1>Set New Password</h1>
                <p>Create a strong password for your account</p>
            </div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="newPassword" 
                            placeholder="••••••••"
                            required
                            autocomplete="new-password"
                        >
                        <button 
                            type="button" 
                            class="toggle-password" 
                            onclick="togglePasswordVisibility('newPassword')"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <div class="password-strength-text" id="strengthText">
                            Password strength: Weak
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            placeholder="••••••••"
                            required
                            autocomplete="new-password"
                        >
                        <button 
                            type="button" 
                            class="toggle-password" 
                            onclick="togglePasswordVisibility('confirmPassword')"
                        >
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password Requirements:</label>
                    <ul class="password-requirements">
                        <li id="req-length">
                            <i class="fas fa-times"></i>
                            Minimum 8 characters
                        </li>
                        <li id="req-uppercase">
                            <i class="fas fa-times"></i>
                            Uppercase letter (A-Z)
                        </li>
                        <li id="req-lowercase">
                            <i class="fas fa-times"></i>
                            Lowercase letter (a-z)
                        </li>
                        <li id="req-number">
                            <i class="fas fa-times"></i>
                            Number (0-9)
                        </li>
                        <li id="req-special">
                            <i class="fas fa-times"></i>
                            Special character (!@#$%)
                        </li>
                    </ul>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">
                    <i class="fas fa-check"></i>
                    Save Password
                </button>
            </form>

            <div class="back-to-login">
                <a href="login.html">
                    <i class="fas fa-arrow-left"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script src="js/ui.js"></script>

    <script type="module">
        import { updatePassword, calculatePasswordStrength, validatePasswordRequirements } from './js/password-reset.js';

        // Password visibility toggle
        window.togglePasswordVisibility = function(inputId) {
            const input = document.getElementById(inputId);
            const button = input.parentElement.querySelector('.toggle-password i');
            
            if (input.type === 'password') {
                input.type = 'text';
                button.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                button.className = 'fas fa-eye';
            }
        };

        // Password strength indicator
        const newPasswordInput = document.getElementById('newPassword');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        newPasswordInput.addEventListener('input', function() {
            const password = this.value;
            const strength = calculatePasswordStrength(password);
            const requirements = validatePasswordRequirements(password);

            // Update strength bar
            let strengthClass = 'weak';
            let strengthLabel = 'Weak';
            
            if (strength >= 4) {
                strengthClass = 'good';
                strengthLabel = 'Strong';
            } else if (strength >= 2) {
                strengthClass = 'fair';
                strengthLabel = 'Medium';
            }

            strengthFill.className = 'strength-fill ' + strengthClass;
            strengthText.textContent = 'Password strength: ' + strengthLabel;
            strengthText.className = 'password-strength-text ' + strengthClass;

            // Update requirements
            Object.keys(requirements).forEach(key => {
                const element = document.getElementById('req-' + key);
                if (requirements[key]) {
                    element.classList.add('valid');
                    element.querySelector('i').className = 'fas fa-check';
                } else {
                    element.classList.remove('valid');
                    element.querySelector('i').className = 'fas fa-times';
                }
            });
        });

        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            // Validation
            if (newPassword !== confirmPassword) {
                showNotification('Passwords do not match!', 'success'); // Green/White as requested
                return;
            }

            const requirements = validatePasswordRequirements(newPassword);
            const allValid = Object.values(requirements).every(v => v);
            
            if (!allValid) {
                showNotification('Please meet all password requirements!', 'success');
                return;
            }

            try {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                submitBtn.disabled = true;

                const result = await updatePassword(newPassword);
                
                showNotification('✅ ' + result.message + '\n\nRedirecting to login...', 'success');

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } catch (error) {
                showNotification('❌ Error: ' + error.message, 'success');
                submitBtn.innerHTML = '<i class="fas fa-check"></i> Save Password';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
