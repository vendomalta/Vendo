<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews - VENDO</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/verde-logo.svg" sizes="any">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/reviews.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header id="header-placeholder"></header>

    <main class="reviews-page">
        <!-- Mobile Header -->
        <div class="mobile-listing-header">
            <button class="back-btn" onclick="history.back()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h2>Reviews</h2>
        </div>

        <div class="container">
            <!-- Page Header -->
            <div class="page-header">
                <div class="header-content">
                    <h1>Reviews</h1>
                    <p class="header-subtitle">Manage your overall rating and feedback from the community</p>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                        <i class="fas fa-comment-dots"></i>
                    </div>
                    <div class="stat-content">
                        <h3 id="totalReceived">0</h3>
                        <p>Total Received</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: rgba(245, 158, 11, 0.1); color: #f59e0b;">
                        <i class="fas fa-star" id="avg-star-icon"></i>
                    </div>
                    <div class="stat-content">
                        <h3 id="avgRating">-</h3>
                        <p>Average Rating</p>
                    </div>
                </div>
            </div>

            <!-- Tabs Navigation -->
            <div class="ads-controls">
                <div class="filter-tabs">
                    <button class="tab-btn active" onclick="switchTab('received')" id="tabReceived">
                        Received (0)
                    </button>
                    <button class="tab-btn" onclick="switchTab('given')" id="tabGiven">
                        Given (0)
                    </button>
                </div>
            </div>

            <!-- Reviews List -->
            <div id="reviewsList" class="reviews-list">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>
    <script type="module">
        import { supabase } from './js/supabase.js';
        document.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            const { data: { user }, error: authError } = await supabase.auth.getUser();
            if (authError || !user) {
                window.location.href = 'login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return;
            }

            // Sync sidebar info (if sidebar is added in future or present in layout)
            try {
                const name = user.user_metadata?.full_name || user.email?.split('@')[0];
                const sidebarName = document.getElementById('sidebarProfileName');
                if (sidebarName) sidebarName.textContent = name;
                
                const { data: profile } = await supabase.from('profiles').select('avatar_url').eq('id', user.id).single();
                if (profile?.avatar_url) {
                    const sidebarImg = document.getElementById('sidebarProfileImage');
                    if (sidebarImg) sidebarImg.src = profile.avatar_url;
                }
            } catch (e) {
                console.warn('Sidebar sync error:', e);
            }
        });
    </script>
    <script type="module" src="js/reviews-manager.js"></script>
</body>
</html>
