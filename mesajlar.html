<!DOCTYPE html>
<html lang="tr" class="messages-page-active">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Messages - VERDE</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/verde-logo.svg" sizes="any">
    <link rel="shortcut icon" href="assets/images/verde-logo.svg">
    <link rel="apple-touch-icon" href="assets/images/verde-logo.svg">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/messages.css">
    <link rel="stylesheet" href="css/transaction-approval.css">

    <!-- Supabase Configuration -->
    <meta name="supabase-url" content="https://aiqweggiolawgphxupat.supabase.co">
    <meta name="supabase-key" content="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpcXdlZ2dpb2xhd2dwaHh1cGF0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwNDQwNjksImV4cCI6MjA4ODYyMDA2OX0.x2QOi8OuQRRR0iM_NqSIVw8igSXcb9bQ5s3VVAsc-3Y">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- DOMPurify Library -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>

<body class="messages-page-active">
    <div id="header-placeholder"></div>

    <input type="file" id="fileInput" style="display: none;" multiple>

    <main class="messages-page">
        <div class="messages-container">

            <div class="conversations-list">
                <div class="conversations-header">
                    <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                        <input type="text" id="conversationSearch" placeholder="Search..."
                            style="flex: 1; padding: 10px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.9rem;">
                        <!-- Bulk Delete Button (Moved next to Search bar) -->
                         <button id="bulkDeleteToggleBtn" class="bulk-delete-btn" title="Bulk Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>

                    <!-- Search Filters -->
                    <div class="search-filters" id="searchFilters">
                        <button class="filter-chip active" data-filter="all">
                            All
                        </button>
                        <button class="filter-chip" data-filter="buying">
                            Buying
                        </button>
                        <button class="filter-chip" data-filter="selling">
                            Selling
                        </button>
                        <button class="filter-chip" data-filter="archived">
                            Archive
                        </button>
                    </div>

                    <div class="bulk-delete-controls"
                        style="display: flex; gap: 6px; align-items: center; margin-top: 8px;">
                        
                        <div id="bulkDeleteActions" class="bulk-delete-actions"
                            style="display: none; flex: 1; gap: 6px;">
                            <button id="selectAllBtn" class="btn-secondary-small">
                                <i class="fas fa-check-square"></i> Select All
                            </button>
                            <button id="deleteSelectedBtn" class="btn-danger-small" disabled>
                                <i class="fas fa-trash"></i> Delete (<span id="selectedCount">0</span>)
                            </button>
                            <button id="cancelBulkDeleteBtn" class="btn-cancel-small">
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>

                <div class="conversations" id="conversationsList">
                    <!-- Conversations will be loaded dynamically here -->
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Loading conversations...</p>
                    </div>
                </div>
            </div>

            <div class="message-detail" id="messageDetail">
                <div class="ad-reference" id="adReference" style="display: none;">
                    <!-- Ad details will be dynamically loaded here -->
                </div>

                <div class="messages-content" id="messagesContent">
                    <!-- Messages will be horizontally loaded here -->
                    <div class="empty-state">
                        <i class="fas fa-comments" style="font-size: 4rem; color: #d1d5db; margin-bottom: 1rem;"></i>
                        <p>Select a conversation</p>
                    </div>
                </div>

                <!-- Transaction Approval Section -->
                <div id="transaction-container"></div>

                <div class="message-input-area">
                    <div class="input-container">
                        <button class="approval-toggle-btn" title="Transaction Approval"><i
                                class="fas fa-handshake"></i></button>
                        <input type="text" placeholder="Write a message..." class="message-input">
                        <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Report Modal -->
    <div id="report-modal" class="modal-overlay" style="display: none;">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2>Report User</h2>
                <button class="modal-close" id="closeReportModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="report-form">
                    <div class="form-group">
                        <label>Reason for Report <span class="required">*</span></label>
                        <select id="report-reason" required class="form-control">
                            <option value="">Select...</option>
                            <option value="spam">Spam / Harassment</option>
                            <option value="inappropriate">Inappropriate Content</option>
                            <option value="fraud">Suspected Fraud</option>
                            <option value="safety">Security Threat</option>
                            <option value="rules">Listing Violates Rules</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Your Email Address <span class="required">*</span></label>
                        <input type="email" id="report-email" required class="form-control" placeholder="An email we can reach you at">
                    </div>
                    <div class="form-group">
                        <label>Description <span class="required">*</span></label>
                        <textarea id="report-description" required class="form-control" rows="4" placeholder="Please provide details about your report..."></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="cancelReportBtn">Cancel</button>
                        <button type="submit" class="btn btn-danger">Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/realtime-notifications.js"></script>
    <script type="module" src="js/transaction-approval.js"></script>
    <script type="module" src="js/message-transaction-ui.js"></script>
    <script type="module" src="js/messages.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Check if messages.js is loaded
            const scriptCheck = document.querySelector('script[src="js/messages.js"]');
            if (scriptCheck) {
                console.log("Messages.js path looks correct.");
            } else {
                console.error("ERROR: messages.js file could not be linked to HTML!");
                if (typeof showNotification === 'function') {
                    showNotification('Warning: JS file not found. Buttons may not work.', 'error');
                } else if (typeof showInlineToast === 'function') {
                    showInlineToast('Warning: JS file not found. Buttons may not work.', 'error');
                } else {
                    console.warn('Warning: JS file not found. Buttons may not work.');
                }
            }
        });
    </script>
</body>

</html>
