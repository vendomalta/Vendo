<!DOCTYPE html>
<html lang="tr" class="messages-page-active">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesajlarım - VERDE</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/verde-logo.svg" sizes="any">
    <link rel="shortcut icon" href="assets/images/verde-logo.svg">
    <link rel="apple-touch-icon" href="assets/images/verde-logo.svg">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pages/messages.css">
    <link rel="stylesheet" href="css/transaction-approval.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- DOMPurify Library -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>

<body class="messages-page-active">
    <div id="header-placeholder"></div>

    <input type="file" id="fileInput" style="display: none;" multiple>

    <main class="messages-page">
        <div class="messages-container">

            <div class="conversations-list">
                <div class="conversations-header">
                    <div style="display: flex; gap: 6px; margin-bottom: 8px;">
                        <input type="text" id="conversationSearch" placeholder="Ara..."
                            style="flex: 1; padding: 10px 12px; border: 1px solid var(--gray-300); border-radius: 8px; font-size: 0.9rem;">
                        <!-- Toplu Sil Butonu (Search bar yanına taşındı) -->
                         <button id="bulkDeleteToggleBtn" class="bulk-delete-btn" title="Toplu Sil">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>

                    <!-- Arama Filtreleri -->
                    <div class="search-filters" id="searchFilters">
                        <button class="filter-chip active" data-filter="all">
                            Tümü
                        </button>
                        <button class="filter-chip" data-filter="buying">
                            Alış
                        </button>
                        <button class="filter-chip" data-filter="selling">
                            Satış
                        </button>
                        <button class="filter-chip" data-filter="archived">
                            Arşiv
                        </button>
                    </div>

                    <div class="bulk-delete-controls"
                        style="display: flex; gap: 6px; align-items: center; margin-top: 8px;">
                        
                        <div id="bulkDeleteActions" class="bulk-delete-actions"
                            style="display: none; flex: 1; gap: 6px;">
                            <button id="selectAllBtn" class="btn-secondary-small">
                                <i class="fas fa-check-square"></i> Tümünü Seç
                            </button>
                            <button id="deleteSelectedBtn" class="btn-danger-small" disabled>
                                <i class="fas fa-trash"></i> Sil (<span id="selectedCount">0</span>)
                            </button>
                            <button id="cancelBulkDeleteBtn" class="btn-cancel-small">
                                İptal
                            </button>
                        </div>
                    </div>
                </div>

                <div class="conversations" id="conversationsList">
                    <!-- Konuşmalar buraya dinamik olarak yüklenecek -->
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Konuşmalar yükleniyor...</p>
                    </div>
                </div>
            </div>

            <div class="message-detail" id="messageDetail">
                <div class="ad-reference" id="adReference" style="display: none;">
                    <!-- İlan bilgisi buraya dinamik olarak yüklenecek -->
                </div>

                <div class="messages-content" id="messagesContent">
                    <!-- Mesajlar buraya dinamik olarak yüklenecek -->
                    <div class="empty-state">
                        <i class="fas fa-comments" style="font-size: 4rem; color: #d1d5db; margin-bottom: 1rem;"></i>
                        <p>Bir konuşma seçin</p>
                    </div>
                </div>

                <!-- İşlem Onay Bölümü -->
                <div id="transaction-container"></div>

                <div class="message-input-area">
                    <div class="input-container">
                        <button class="approval-toggle-btn" title="İşlem Onayı"><i
                                class="fas fa-handshake"></i></button>
                        <input type="text" placeholder="Bir mesaj yazın..." class="message-input">
                        <button class="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Report Modal -->
    <div id="report-modal" class="modal-overlay" style="display: none;">
        <div class="modal-dialog">
            <div class="modal-header">
                <h2>Kullanıcıyı Raporla</h2>
                <button class="modal-close" id="closeReportModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="report-form">
                    <div class="form-group">
                        <label>Şikayet Nedeni <span class="required">*</span></label>
                        <select id="report-reason" required class="form-control">
                            <option value="">Seçiniz...</option>
                            <option value="spam">Spam / Rahatsız Edici</option>
                            <option value="inappropriate">Uygunsuz İçerik</option>
                            <option value="fraud">Dolandırıcılık Şüphesi</option>
                            <option value="safety">Güvenlik Tehdidi</option>
                            <option value="rules">Kurallara Aykırı İlan</option>
                            <option value="other">Diğer</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>E-posta Adresiniz <span class="required">*</span></label>
                        <input type="email" id="report-email" required class="form-control" placeholder="Size ulaşabileceğimiz e-posta">
                    </div>
                    <div class="form-group">
                        <label>Açıklama <span class="required">*</span></label>
                        <textarea id="report-description" required class="form-control" rows="4" placeholder="Lütfen şikayetinizi detaylandırın..."></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" id="cancelReportBtn">İptal</button>
                        <button type="submit" class="btn btn-danger">Raporla</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="js/supabase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/realtime-notifications.js"></script>
    <script type="module" src="js/transaction-approval.js"></script>
    <script type="module" src="js/message-transaction-ui.js"></script>
    <script type="module" src="js/messages.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/layout.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Eğer messages.js yüklenemediyse send-btn tıklanınca hiçbir şey olmaz.
            // Bu yüzden JS'in yüklendiğini kontrol edelim.
            const scriptCheck = document.querySelector('script[src="js/messages.js"]');
            if (scriptCheck) {
                console.log("Messages.js yolu doğru görünüyor.");
            } else {
                console.error("HATA: messages.js dosyası HTML'e bağlanamamış!");
                if (typeof showNotification === 'function') {
                    showNotification('Uyarı: JS dosyası bulunamadı. Butonlar çalışmayabilir.', 'error');
                } else if (typeof showInlineToast === 'function') {
                    showInlineToast('Uyarı: JS dosyası bulunamadı. Butonlar çalışmayabilir.', 'error');
                } else {
                    console.warn('Uyarı: JS dosyası bulunamadı. Butonlar çalışmayabilir.');
                }
            }
        });
    </script>
</body>

</html>
